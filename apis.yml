aid: yaskawa-robotics
name: Yaskawa / Motoman
description: >-
  Yaskawa Electric Corporation is a Kitakyushu, Japan industrial automation
  company and the world's largest manufacturer of AC servo motors and motion
  controllers, with major business segments in motion control (AC servo
  motors, SERVOPACK amplifiers, machine controllers), AC drives / inverters,
  industrial robotics (under the Motoman brand), and systems engineering.
  Yaskawa's Motoman robotics division supplies articulated, SCARA, delta,
  collaborative, and mini robots used across automotive, EV, semiconductor,
  electronics, food, biomedical, and logistics manufacturing, alongside its
  Sigma-X servo family and GA / U1000 industrial AC drives. The company
  exposes a developer surface through the Yaskawa Motoman Developer Portal at
  developer.motoman.com and the Yaskawa-Global GitHub organization, including
  YMConnect (a modern PC-side communication library for C++ 17 and C#),
  MotoPlus SDK (on-controller C code for deterministic motion, I/O, jobs, and
  alarms), MotoROS2 (a native ROS 2 / micro-ROS node running on DX200,
  YRC1000, and YRC1000micro controllers), MotoCom SDK (legacy Windows
  communication SDK), the Smart Pendant SDK (Java extensions for the Smart
  Pendant teach interface), and YIP (Yaskawa Innovation Plus) packages and
  Smart Packager tooling. The catalog is SDK- and protocol-driven rather
  than HTTP/REST — there are no public OpenAPI specifications, so this
  profile captures the SDK, ROS, GitHub, and developer-portal surface
  without generated OpenAPI artifacts.
